<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salsabilah AI Assistant</title>
    <style>
        body { font-family: sans-serif; background: #0b0e14; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px; border-radius: 10px; max-width: 80%; }
        .user { align-self: flex-end; background: #38bdf8; color: black; }
        .ai { align-self: flex-start; background: #1e293b; border: 1px solid #334155; }
        .input-area { padding: 15px; display: flex; background: #1e293b; }
        input { flex: 1; padding: 10px; border-radius: 5px; border: none; outline: none; }
        button { padding: 10px 20px; background: #38bdf8; border: none; border-radius: 5px; margin-left: 10px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div id="chat-box">
        <div class="msg ai">হ্যালো মামা! আমি এখন লাইভ। কোনো টাকা ছাড়াই আমার সাথে কথা বলুন।</div>
    </div>
    <div class="input-area">
        <input type="text" id="userInput" placeholder="আপনার বার্তা...">
        <button onclick="talk()">Send</button>
    </div>

    <script>
        function talk() {
            const box = document.getElementById('chat-box');
            const input = document.getElementById('userInput');
            if(!input.value) return;

            const uDiv = document.createElement('div');
            uDiv.className = 'msg user';
            uDiv.textContent = input.value;
            box.appendChild(uDiv);

            // সিম্পল ফ্রি রেসপন্স
            setTimeout(() => {
                const aDiv = document.createElement('div');
                aDiv.className = 'msg ai';
                aDiv.textContent = "মামা, আমি আপনার কথা শুনতে পাচ্ছি! আর কাউকে টাকা দেবেন না। আমি আপনার ফ্রেন্ড।";
                box.appendChild(aDiv);
                box.scrollTop = box.scrollHeight;
            }, 800);

            input.value = "";
            box.scrollTop = box.scrollHeight;
        }
    </script>
</body>
</html>
