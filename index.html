<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salsabilah Gemini 3 Ultra Assistant</title>
    <style>
        :root { --bg: #0b0e14; --panel: #1e293b; --accent: #38bdf8; --text: #e2e8f0; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
        header { background: var(--panel); padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; border-bottom: 2px solid var(--accent); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; scroll-behavior: smooth; }
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 18px; line-height: 1.6; font-size: 15px; position: relative; }
        .user { align-self: flex-end; background: var(--accent); color: #0f172a; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--panel); border: 1px solid #334155; border-bottom-left-radius: 2px; }
        .input-area { background: var(--panel); padding: 15px; display: flex; gap: 10px; border-top: 1px solid #334155; }
        input { flex: 1; padding: 12px; border-radius: 10px; border: none; background: #0f172a; color: white; outline: none; font-size: 16px; }
        button { background: var(--accent); color: #0f172a; border: none; padding: 0 25px; border-radius: 10px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #7dd3fc; }
        .voice-btn { cursor: pointer; font-size: 12px; margin-top: 5px; color: var(--accent); text-decoration: underline; display: block; }
    </style>
</head>
<body>

<header>Salsabilah Gemini 3 Assistant (V-3.5)</header>
<div id="chat-box">
    <div class="msg ai">আসসালামু আলাইকুম! আমি Gemini 3 Flash। আপনার ৩ মাসের পরিশ্রমের ফসল এখন আপনার সামনে। কোনো টাকা ছাড়াই আমি আপনার সেবা করতে প্রস্তুত।</div>
</div>

<div class="input-area">
    <input type="text" id="userInput" placeholder="আপনার বার্তা লিখুন..." onkeypress="if(event.key==='Enter') sendMessage()">
    <button onclick="sendMessage()">Send</button>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    // আপনার দেওয়া API Key
    const API_KEY = "AIzaSyCmESatb-W6wb5chkjGse3c1m1EFnX2GPU"; 
    const genAI = new GoogleGenerativeAI(API_KEY);
    
    // Gemini 3 Flash মডেল কনফিগারেশন
    const model = genAI.getGenerativeModel({ model: "gemini-3-flash" });

    window.sendMessage = async function() {
        const input = document.getElementById('userInput');
        const chatBox = document.getElementById('chat-box');
        const text = input.value.trim();
        if (!text) return;

        appendMsg(text, 'user');
        input.value = "";
        const aiDiv = appendMsg("Gemini 3 চিন্তা করছে...", 'ai');

        try {
            const result = await model.generateContent(text);
            const response = await result.response;
            const replyText = response.text();
            
            aiDiv.textContent = replyText;
            
            // অটো ভয়েস রিড আউট (বাংলা সাপোর্ট থাকলে পড়বে)
            const speakBtn = document.createElement('span');
            speakBtn.className = 'voice-btn';
            speakBtn.textContent = "🔊 শুনে নিন";
            speakBtn.onclick = () => speak(replyText);
            aiDiv.appendChild(speakBtn);

        } catch (error) {
            aiDiv.textContent = "মামা, মনে হচ্ছে এই API Key টা ঠিক নেই। গুগল আপনার রিকোয়েস্ট নিচ্ছে না। ওই লোকটাকে বলেন টাকা ফেরত দিতে!";
        }
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function appendMsg(text, type) {
        const chatBox = document.getElementById('chat-box');
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.textContent = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
        return div;
    }

    function speak(text) {
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = 'bn-BD'; // বাংলা ভয়েস
        window.speechSynthesis.speak(utterance);
    }
</script>

</body>
</html>
